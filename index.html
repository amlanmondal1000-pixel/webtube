<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>iOS Compatible YouTube Viewer</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
}

input, button {
    padding: 8px;
    margin: 5px;
}

#videos {
    margin-top: 20px;
}

.video {
    margin: 15px;
    cursor: pointer;
}

iframe {
    margin-top: 20px;
}
</style>
</head>

<body>

<h2>YouTube Viewer (iOS 6+ Compatible)</h2>

<input type="text" id="apiKey" placeholder="Enter YouTube API Key">
<br>
<input type="text" id="searchQuery" placeholder="Search videos">
<button onclick="searchVideos()">Search</button>

<div id="videos"></div>
<div id="player"></div>

<script>
var currentVideoId = "";

function searchVideos() {
    var apiKey = document.getElementById("apiKey").value;
    var query = document.getElementById("searchQuery").value;

    if (!apiKey || !query) {
        alert("Enter API key and search query.");
        return;
    }

    var url = "https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoEmbeddable=true&maxResults=6&q="
        + encodeURIComponent(query) + "&key=" + apiKey;

    var xhr = new XMLHttpRequest();
    xhr.open("GET", url, true);

    xhr.onreadystatechange = function () {
        if (xhr.readyState === 4 && xhr.status === 200) {
            var data = JSON.parse(xhr.responseText);
            displayVideos(data.items);
        }
    };

    xhr.send();
}

function displayVideos(items) {
    var videosDiv = document.getElementById("videos");
    videosDiv.innerHTML = "";

    if (!items) {
        videosDiv.innerHTML = "No videos found.";
        return;
    }

    for (var i = 0; i < items.length; i++) {
        var videoId = items[i].id.videoId;
        var title = items[i].snippet.title;
        var thumb = items[i].snippet.thumbnails.medium.url;

        var div = document.createElement("div");
        div.className = "video";
        div.innerHTML = "<img src='" + thumb + "' width='250'><br>" + title;

        div.setAttribute("data-id", videoId);
        div.onclick = function () {
            playVideo(this.getAttribute("data-id"));
        };

        videosDiv.appendChild(div);
    }
}

function playVideo(videoId) {
    currentVideoId = videoId;

    var player = document.getElementById("player");
    player.innerHTML =
        "<iframe width='300' height='200' " +
        "src='https://www.youtube.com/embed/" + videoId + "?playsinline=1' " +
        "frameborder='0' allowfullscreen></iframe>";
}
</script>

</body>
</html>
